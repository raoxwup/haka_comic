  sqlite3: ^3.3.1
  sqlite_async: ^0.14.1
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  dynamic_color: ^1.8.1
  path: ^1.9.1
  url_launcher: ^6.3.2
  yaml: ^3.1.3
  jiffy: ^6.4.4
  version: ^3.0.2
  photo_view:
