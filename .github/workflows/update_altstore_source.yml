name: Update AltStore Source

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-altstore-json:
    name: Update alt_store.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Extract IPA asset metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os, re, sys

          event_path = os.environ["GITHUB_EVENT_PATH"]
          with open(event_path, "r", encoding="utf-8") as f:
            event = json.load(f)

          release = event["release"]
          tag = release["tag_name"]
          date = release.get("published_at") or release.get("created_at") or ""
          assets = release.get("assets", [])

          def split_version_build(value):
            value = (value or "").strip()
            if value.startswith("v"):
              value = value[1:]
            if "+" in value:
              version, build = value.split("+", 1)
              return version, build
            return value, ""

          ipa = None
          for a in assets:
            name = a.get("name", "")
            if name.endswith(".ipa") and "no-codesign-ios" in name:
              ipa = a
              break
          if ipa is None:
            for a in assets:
              if a.get("name", "").endswith(".ipa"):
                ipa = a
                break
          if ipa is None:
            print("has_ipa=false")
            sys.exit(0)
          print("has_ipa=true")

          ipa_name = ipa.get("name", "")
          download_url = ipa.get("browser_download_url", "")
          size = ipa.get("size", 0)
          if not download_url:
            print("Selected IPA asset has no browser_download_url", file=sys.stderr)
            sys.exit(1)
          if not isinstance(size, int) or size <= 0:
            print(f"Selected IPA asset has invalid size: {size}", file=sys.stderr)
            sys.exit(1)

          # Prefer parsing version from the IPA name: no-codesign-ios-v<version>.ipa
          m = re.search(r"no-codesign-ios-v(.+)\.ipa$", ipa_name)
          if m:
            asset_version, asset_build = split_version_build(m.group(1))
          else:
            asset_version, asset_build = "", ""

          tag_version, tag_build = split_version_build(tag)
          version = asset_version or tag_version
          build_version = asset_build or tag_build or version
          if not version or not build_version:
            print(
              f"Could not determine version/buildVersion from tag={tag!r} asset={ipa_name!r}",
              file=sys.stderr,
            )
            sys.exit(1)

          print(f"tag={tag}")
          print(f"date={date}")
          print(f"version={version}")
          print(f"build_version={build_version}")
          print(f"asset_name={ipa_name}")
          print(f"download_url={download_url}")
          print(f"size={size}")
          PY

      - name: Update alt_store.json
        if: ${{ steps.meta.outputs.has_ipa == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          dart script/update_alt_store_json.dart \
            --json alt_store.json \
            --version "${{ steps.meta.outputs.version }}" \
            --buildVersion "${{ steps.meta.outputs.build_version }}" \
            --date "${{ steps.meta.outputs.date }}" \
            --downloadURL "${{ steps.meta.outputs.download_url }}" \
            --size "${{ steps.meta.outputs.size }}"

      - name: Commit & push
        if: ${{ steps.meta.outputs.has_ipa == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add alt_store.json
          if git diff --cached --quiet; then
            echo "alt_store.json unchanged; nothing to commit."
            exit 0
          fi

          git commit -m "chore: update AltStore source (${{ steps.meta.outputs.version }})"
          git push
