name: Cross-Platform Build

on:
  push:
    branches: [main]
    paths-ignore:
      - alt_store.json
  workflow_dispatch:
    inputs:
      branch:
        description: "要构建的分支"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - main
      target:
        description: "要构建的平台"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - android
          - ios
          - macos
          - windows
          - linux

env:
  BUILD_BRANCH: ${{ github.event.inputs.branch || github.ref_name }}
  FLUTTER_CHANNEL: stable
  FLUTTER_VERSION_FILE: pubspec.yaml

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      app-version: ${{ steps.get_version.outputs.app-version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.BUILD_BRANCH }}
      - id: get_version
        run: |
          version=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "app-version=$version" >> $GITHUB_OUTPUT

  android-build:
    if: ${{ github.event_name == 'push' || github.event.inputs.target == 'android' || github.event.inputs.target == 'all' }}
    name: Android Build
    needs: setup
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: -Dorg.gradle.caching=true

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.BUILD_BRANCH }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version-file: ${{ env.FLUTTER_VERSION_FILE }}
          cache: true
          pub-cache: true

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            !~/.gradle/caches/modules-2/modules-2.lock
            !~/.gradle/caches/modules-2/gc.properties
          key: ${{ runner.os }}-gradle-jdk17-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/gradle.properties', 'android/settings.gradle.kts', 'android/build.gradle.kts', 'android/app/build.gradle.kts', 'rust_builder/android/settings.gradle', 'rust_builder/android/build.gradle', 'rust_builder/cargokit/gradle/plugin.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-jdk17-
            ${{ runner.os }}-gradle-

      - name: Cache Android Rust build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            build/rust_lib_haka_comic/build
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('rust/Cargo.lock') }}-${{ hashFiles('rust/Cargo.toml', 'rust/build.rs', 'rust/src/**/*.rs', 'rust_builder/android/build.gradle', 'rust_builder/cargokit/**') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-${{ hashFiles('rust/Cargo.lock') }}-
            ${{ runner.os }}-cargo-android-

      - name: Prepare signing files
        run: |
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > android/app/upload-keystore.jks

      - name: Prepare Flutter project
        run: |
          flutter pub get
          dart run script/prebuild_inject_version.dart

      - name: Build APKs
        run: |
          flutter build apk --release
          flutter build apk --release --split-per-abi

      - name: Move And Rename APKs
        run: |
          version=${{ needs.setup.outputs.app-version }}
          mkdir -p artifacts
          for file in build/app/outputs/flutter-apk/*.apk; do
            filename=$(basename "$file")
            if [ "$filename" = "app-release.apk" ]; then
              filename="app-universal-release.apk"
            fi
            mv "$file" "artifacts/${filename%.apk}-v$version.apk"
          done

      - name: Upload APKs
        uses: actions/upload-artifact@v7
        with:
          name: android-apks
          path: artifacts/

  ios-build:
    if: ${{ github.event_name == 'push' || github.event.inputs.target == 'ios' || github.event.inputs.target == 'all' }}
    name: iOS Build
    needs: setup
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.BUILD_BRANCH }}

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version-file: ${{ env.FLUTTER_VERSION_FILE }}
          architecture: x64
          cache: true
          pub-cache: true

      - run: sudo xcode-select --switch /Applications/Xcode_26.2.app

      - name: Prepare Flutter project
        run: |
          flutter pub get
          dart run script/prebuild_inject_version.dart

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/CocoaPods
            ios/Pods
          key: ${{ runner.os }}-${{ runner.arch }}-ios-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-ios-pods-

      - name: Cache iOS Rust build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            build/ios/**/rust_lib_haka_comic.build
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-ios-${{ hashFiles('rust/Cargo.lock') }}-${{ hashFiles('rust/Cargo.toml', 'rust/build.rs', 'rust/src/**/*.rs', 'rust_builder/ios/**', 'rust_builder/cargokit/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-ios-${{ hashFiles('rust/Cargo.lock') }}-
            ${{ runner.os }}-${{ runner.arch }}-cargo-ios-

      - name: Build unsigned IPA
        run: |
          flutter build ios --release --no-codesign
          mkdir -p build/ios/iphoneos/Payload
          mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos/
          zip -r no-codesign-ios-v${{ needs.setup.outputs.app-version }}.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v7
        with:
          name: ios-ipa
          path: build/ios/iphoneos/*.ipa

  windows-build:
    if: ${{ github.event_name == 'push' || github.event.inputs.target == 'windows' || github.event.inputs.target == 'all' }}
    name: Windows Build
    needs: setup
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.BUILD_BRANCH }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version-file: ${{ env.FLUTTER_VERSION_FILE }}
          cache: true
          pub-cache: true

      - name: Prepare Flutter project
        shell: pwsh
        run: |
          flutter pub get
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dart run script/prebuild_inject_version.dart

      - name: Cache Windows Rust build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            build/windows/x64/plugins/rust_lib_haka_comic/cargokit_build
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-windows-${{ hashFiles('rust/Cargo.lock') }}-${{ hashFiles('rust/Cargo.toml', 'rust/build.rs', 'rust/src/**/*.rs', 'rust_builder/windows/**', 'rust_builder/cargokit/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-windows-${{ hashFiles('rust/Cargo.lock') }}-
            ${{ runner.os }}-${{ runner.arch }}-cargo-windows-

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Create Inno Setup Script
        shell: pwsh
        run: |
          $version = "${{ needs.setup.outputs.app-version }}"
          $appName = "HaKa Comic"

          $exePath = Get-ChildItem -Path "build/windows/x64/runner/Release" -Filter "*.exe" | Select-Object -First 1
          $exeName = $exePath.Name
          $iconFile = "windows_icon-$($env:GITHUB_RUN_NUMBER).ico"

          # 构造输出文件名
          $outputFile = "$appName-Setup-v$version"
          $DefaultDir = "{autopf}/$appName"

          $content = @"
          [Setup]
          AppName=$appName
          AppVersion=$version
          DefaultDirName=$DefaultDir
          DefaultGroupName=$appName
          OutputBaseFilename=$outputFile
          SetupIconFile=assets/icons/pc/windows_icon.ico
          UninstallDisplayIcon={app}\$iconFile
          Compression=lzma
          SolidCompression=yes

          [InstallDelete]
          Type: files; Name: `"{app}\windows_icon*.ico`"

          [Files]
          Source: "assets/icons/pc/windows_icon.ico"; DestDir: "{app}"; DestName: "$iconFile"; Flags: ignoreversion
          Source: "build\\windows\\x64\\runner\\Release\\*"; DestDir: "{app}"; Flags: recursesubdirs

          [Icons]
          Name: `"{group}\$appName`"; Filename: `"{app}\$exeName`"; IconFilename: `"{app}\$iconFile`"; WorkingDir: `"{app}`"
          Name: `"{userdesktop}\$appName`"; Filename: `"{app}\$exeName`"; IconFilename: `"{app}\$iconFile`"; WorkingDir: `"{app}`"

          [Run]
          Filename: `"{app}\$exeName`"; WorkingDir: `"{app}`"; Flags: nowait postinstall skipifsilent

          [Code]
          // 删除 Flutter getApplicationSupportDirectory() 和本地缓存数据目录:
          // Windows 上等于: C:\Users\<User>\AppData\Roaming\com.github.raoxwup\HaKa Comic
          // Windows 上等于: C:\Users\<User>\AppData\Local\com.github.raoxwup\HaKa Comic
          procedure CurUninstallStepChanged(CurUninstallStep: TUninstallStep);
          var
            SupportDir: string;
            LocalDir: string;
          begin
            if CurUninstallStep = usUninstall then
            begin
              SupportDir := ExpandConstant('{userappdata}\com.github.raoxwup\$appName');
              LocalDir := ExpandConstant('{localappdata}\com.github.raoxwup\$appName');

              if DirExists(SupportDir) then
              begin
                Log('Removing ApplicationSupportDirectory: ' + SupportDir);
                DelTree(SupportDir, True, True, True);
              end;

              if DirExists(LocalDir) then
              begin
                Log('Removing LocalAppDataDirectory: ' + LocalDir);
                DelTree(LocalDir, True, True, True);
              end;

              Log('Uninstall cleanup finished.');
            end;
          end;
          "@

          # 输出到文件
          $content | Out-File -FilePath installer.iss -Encoding ascii

      - name: Build Installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer.iss"

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: Output/*.exe

  macos-build:
    if: ${{ github.event_name == 'push' || github.event.inputs.target == 'macos' || github.event.inputs.target == 'all' }}
    name: MacOS Build
    needs: setup
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.BUILD_BRANCH }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version-file: ${{ env.FLUTTER_VERSION_FILE }}
          cache: true
          pub-cache: true

      - name: Prepare Flutter project
        run: |
          flutter pub get
          dart run script/prebuild_inject_version.dart

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/CocoaPods
            macos/Pods
          key: ${{ runner.os }}-${{ runner.arch }}-macos-pods-${{ hashFiles('macos/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-macos-pods-

      - name: Cache macOS Rust build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            build/macos/**/rust_lib_haka_comic.build
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-macos-${{ hashFiles('rust/Cargo.lock') }}-${{ hashFiles('rust/Cargo.toml', 'rust/build.rs', 'rust/src/**/*.rs', 'rust_builder/macos/**', 'rust_builder/cargokit/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-macos-${{ hashFiles('rust/Cargo.lock') }}-
            ${{ runner.os }}-${{ runner.arch }}-cargo-macos-

      - name: Build MacOS Release
        run: flutter build macos --release

      - name: Cache npm packages
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-${{ runner.arch }}-npm-create-dmg
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-npm-

      - name: Install create-dmg
        run: npm install -g create-dmg

      - name: Package .app into DMG
        run: |
          version=${{ needs.setup.outputs.app-version }}
          cd build/macos/Build/Products/Release/
          # 获取 .app 名称
          appName=$(ls -d *.app | head -n 1)
          # 生成 DMG 文件名
          dmgName="${appName%.app}-v$version.dmg"
          echo "Packaging $appName into $dmgName"

          create-dmg "$appName" \
            --overwrite \
            --no-version-in-filename \
            --dmg-title "${appName%.app}" \
            --no-code-sign

          mv *.dmg "$dmgName"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v7
        with:
          name: macos-app-dmg
          path: build/macos/Build/Products/Release/*.dmg

  linux-build:
    if: ${{ github.event_name == 'push' || github.event.inputs.target == 'linux' || github.event.inputs.target == 'all' }}
    name: Linux Build
    needs: setup
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - flutter_arch: x64
            runner: ubuntu-latest
            deb_arch: amd64
          - flutter_arch: arm64
            runner: ubuntu-24.04-arm
            deb_arch: arm64

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.BUILD_BRANCH }}

      - name: Setup Flutter (x64)
        if: ${{ matrix.flutter_arch == 'x64' }}
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version-file: ${{ env.FLUTTER_VERSION_FILE }}
          architecture: x64
          cache: true
          pub-cache: true

      - name: Setup Flutter (arm64)
        if: ${{ matrix.flutter_arch == 'arm64' }}
        uses: subosito/flutter-action@v2
        with:
          channel: main
          flutter-version-file: ${{ env.FLUTTER_VERSION_FILE }}
          cache: true
          pub-cache: true

      - name: Cache Linux Rust build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            build/linux/${{ matrix.flutter_arch }}/release/plugins/rust_lib_haka_comic/cargokit_build
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-linux-${{ matrix.flutter_arch }}-${{ hashFiles('rust/Cargo.lock') }}-${{ hashFiles('rust/Cargo.toml', 'rust/build.rs', 'rust/src/**/*.rs', 'rust_builder/linux/**', 'rust_builder/cargokit/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-linux-${{ matrix.flutter_arch }}-${{ hashFiles('rust/Cargo.lock') }}-
            ${{ runner.os }}-${{ runner.arch }}-cargo-linux-${{ matrix.flutter_arch }}-

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev clang cmake pkg-config ruby ruby-dev

      - name: Prepare Flutter project
        run: |
          flutter pub get
          dart run script/prebuild_inject_version.dart
          dart run script/prebuild_inject_font.dart

      - name: Build Linux Release
        run: |
          flutter build linux --release
          ldd build/linux/${{ matrix.flutter_arch }}/release/bundle/haka_comic

      - name: Cache Ruby gems
        uses: actions/cache@v5
        with:
          path: |
            ~/.gem
            ~/.local/share/gem
          key: ${{ runner.os }}-${{ runner.arch }}-ruby-fpm
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-ruby-

      - name: Install fpm
        run: |
          gem install --user-install fpm --no-document
          echo "$(ruby -e 'print Gem.user_dir')/bin" >> $GITHUB_PATH

      - name: Package Linux Deb
        shell: bash
        run: |
          set -euo pipefail

          version="${{ needs.setup.outputs.app-version }}"
          app_id="com.github.raoxwup.hakacomic"
          app_name="haka_comic"
          app_title="HaKa Comic"
          pkg_name="haka-comic"
          bundle_dir="build/linux/${{ matrix.flutter_arch }}/release/bundle"

          if [ ! -d "$bundle_dir" ]; then
            echo "Bundle not found at $bundle_dir"
            ls -la build/linux || true
            exit 1
          fi

          artifacts_dir="artifacts"
          mkdir -p "$artifacts_dir"

          deb_root="build/linux/package/${{ matrix.deb_arch }}"
          install_dir="$deb_root/opt/$app_name"
          mkdir -p "$install_dir" "$deb_root/usr/bin" "$deb_root/usr/share/applications" "$deb_root/usr/share/pixmaps" "$deb_root/usr/share/icons/hicolor/512x512/apps"
          cp -a "$bundle_dir/." "$install_dir/"
          ln -sf "/opt/$app_name/$app_name" "$deb_root/usr/bin/$app_name"
          cp "assets/icons/pc/linux_icon.png" "$deb_root/usr/share/pixmaps/${app_id}.png"
          cp "assets/icons/pc/linux_icon.png" "$deb_root/usr/share/icons/hicolor/512x512/apps/${app_id}.png"

          cat > "$deb_root/usr/share/applications/${app_id}.desktop" <<EOF
          [Desktop Entry]
          Name=$app_title
          Comment=A third-party PICACG project.
          Exec=$app_name
          Icon=$app_id
          Terminal=false
          Type=Application
          Categories=Utility;
          StartupWMClass=$app_id
          EOF

          fpm -s dir -t deb \
            -n "$pkg_name" \
            -v "$version" \
            -a "${{ matrix.deb_arch }}" \
            --deb-compression xz \
            --deb-compression-level 9 \
            --maintainer "raoxwup" \
            --description "A third-party PICACG project." \
            --license "GPL-3.0" \
            --url "https://github.com/raoxwup/haka_comic" \
            --depends libstdc++6 \
            --depends libgtk-3-0 \
            --depends libglib2.0-0 \
            --depends libblkid1 \
            --depends liblzma5 \
            --depends libepoxy0 \
            -C "$deb_root" \
            -p "$artifacts_dir/${pkg_name}-v$version-${{ matrix.deb_arch }}.deb" \
            .

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-packages-${{ matrix.deb_arch }}
          path: artifacts/*

  release:
    name: Draft Release
    needs:
      - setup
      - android-build
      - ios-build
      - windows-build
      - macos-build
      - linux-build
    if: >-
      ${{ always()
          && !contains(needs.*.result, 'failure')
          && !contains(needs.*.result, 'cancelled') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.BUILD_BRANCH }}
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.setup.outputs.app-version }}+${{ github.run_number }}
          name: v${{ needs.setup.outputs.app-version }}+${{ github.run_number }}
          target_commitish: ${{ env.BUILD_BRANCH }}
          draft: true
          generate_release_notes: false
          files: release-artifacts/**/*
          fail_on_unmatched_files: false
